    - title
  keep_raw: false

deepseek:
  temperature: 0.7

tts:
  provider: "doubao"
  voice: "${DOUBAO_TTS_VOICE}"

audio:
  assets_dir: "./assets"
  intro: "intro.mp3"
  outro: "outro.mp3"
  bgm: "bgm.mp3"
  bgm_volume: 0.18

output:
  out_dir: "./out"
  episodes_dir: "./out/episodes"
  logs_dir: "./out/logs"
  fetch_archives_dir: "./out/fetch_archives"
