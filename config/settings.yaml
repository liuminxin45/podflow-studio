channel:
  id: life-consumer
  name: "生活与消费资讯"
  language: "zh-CN"
  style:
    tone: "口语化、生动、像朋友聊天"
    audience: "普通消费者"
    length_minutes: 6

selection:
  max_clusters: 5
  constraints:
    cooldown_days: 2

source_guard:
  config_dir: "./config/sources"
  min_content_length: 120

compliance:
  policy_level: "standard"
  min_score: 0.6
  rules:
    - sensitive_words
    - copyright
    - pii
    - external_links
  rule_overrides:
    copyright:
      allow_domains:
        - "60s-static.viki.moe"
        - "60s.viki.moe"
        - "github.com"

selection:
  constraints:
    max_per_domain: 3
    max_per_topic: 3
  max_clusters: 5
  clustering:
    simhash_max_distance: 1
    title_min_jaccard: 0.2
    time_window_days: 1

sources:
  rss:
    - name: "示例RSS"
      url: "https://www.zhihu.com/rss"
      enabled: false

    - name: "60s-每天60秒读懂世界(RSS)"
      enabled: true
      category: "others"
      urls:
        - "https://60s.viki.moe/v2/60s/rss"
        - "https://60api.09cdn.xyz/v2/60s/rss"
        - "https://60s.zeabur.app/v2/60s/rss"
        - "https://60s.crystelf.top/v2/60s/rss"
        - "https://cqxx.site/v2/60s/rss"
        - "https://api.yanyua.icu/v2/60s/rss"
        - "https://60s.tmini.net/v2/60s/rss"
        - "https://60s.7se.cn/v2/60s/rss"
        - "https://60s.mizhoubaobei.top/v2/60s/rss"

  aibot_daily:
    - name: "AI工具集-每日AI快讯"
      enabled: true
      category: "others"
      urls:
        - "https://ai-bot.cn/daily-ai-news/"

  sixtys:
    - name: "60s-每天60秒读懂世界"
      base_url: "https://60s.viki.moe"
      base_urls:
        - "60api.09cdn.xyz"
        - "60s.zeabur.app"
        - "60s.crystelf.top"
        - "cqxx.site"
        - "api.yanyua.icu"
        - "60s.tmini.net"
        - "60s.7se.cn"
        - "60s.mizhoubaobei.top"
      enabled: false
      category: "others"

  lily_rss:
    - group: "health"
      enabled: false
      items:
        - name: "丁香医生-知乎专栏"
          kind: "zhihuzhuanlan"
          value: "https://zhuanlan.zhihu.com/dingxiangyisheng"

    - group: "others"
      enabled: false
      items:
        - name: "LilyRSS-知乎动态-简单心理"
          kind: "zhihu"
          value: "https://www.zhihu.com/org/jian-dan-xin-li"
          enabled: true

        - name: "LilyRSS-知乎话题"
          kind: "zhihu_topic"
          value: "https://www.zhihu.com/topic/19551894"
          query:
            sort: hot

        - name: "LilyRSS-V2EX-评论"
          kind: "v2ex"
          value: "https://www.v2ex.com/t/123456"
          enabled: false

pipeline:
  max_items: 8
  pick_items: 5
  dedup_enabled: true
  filter_enabled: true

# 汇总型RSS拆分配置
digest_split:
  enabled: true
  cache_ttl_seconds: 86400
  enable_cache: true

filter:
  fields:
    - "title"
    - "content"
    - "url"
  keep_raw: false

llm:
  provider: "deepseek"
  model: "deepseek-chat"
  timeout_seconds: 120
  max_tokens: 4000
  temperature: 0.7

tts:
  provider: "doubao"
  mode: "default"
  voice: "zh_female_tianqing_moon_bigtts"
  speed: 1.0
  volume: 1.0
  pitch: 1.0
  timeout_seconds: 60

output:
  runs_dir: "./out/runs"
  fetch_archives_dir: "./out/fetch"
  script_dir: "./out/script"
  tts_dir: "./out/tts"
  render_dir: "./out/render"
  publish_dir: "./out/publish"

research:
  provider: "anspire"  # Options: metaso, anspire
  enabled: true
  timeout_seconds: 60
  max_items: 10
  max_retries: 3
  retry_delay: 1.0
  # Provider-specific settings
  metaso:
    model: "fast"
  anspire:
    top_k: 5
    is_stream: false

# Pipeline 配置（二次检索+二阶段LLM）
pipeline_v2:
  retrieval:
    max_concurrent: 2
    timeout_seconds: 60
    cache_ttl_seconds: 86400  # 24小时
    cache_dir: ".cache/research"
    history_podcast_dir: "out/history_podcasts"
    top_k_history: 5
  llm_stage1:
    timeout_seconds: 60
    max_tokens: 3000
  llm_stage2:
    timeout_seconds: 60
    max_tokens: 2500
  fallback:
    use_draft_on_failure: true  # LLM#2失败时使用draft

# 自动选题配置（主题候选挖掘 + 听众兴趣评分 + 选题决策）
auto_topic:
  enabled: true  # 开关：true启用自动选题，false使用传统流程
  time_window_days: 7  # 主题聚合时间窗口（天）
  
  # 打分配置 - 统一0-100分数体系
  scoring:
    # 内容价值分 (0-60)
    archetype_mean_max: 40.0        # 母型平均分最大值
    personal_impact_max: 10.0       # 个人影响分最大值
    counter_intuitive_max: 10.0     # 反直觉分最大值
    
    # 代理信号分 (0-25)
    trend_max: 10.0                 # 趋势信号最大值
    time_max: 5.0                   # 时间信号最大值
    persona_max: 5.0                # 人群相关性最大值
    history_echo_max: 5.0           # 历史呼应最大值
    
    # 结构加成 (-10 ~ +15)
    continuity_max: 6.0             # 连续性加成最大值
    data_enrichable_max: 6.0        # 数据可补充加成最大值
    follow_up_max: 3.0              # 可跟进加成最大值
    
    # 阈值配置 (0-100)
    threshold_must_publish: 70.0    # 必播阈值（>=70分）
    threshold_maybe_publish: 55.0   # 可能播阈值（55-70分）
  
  # LLM Gate配置
  gate:
    top_n: 10                   # 对TopN候选做LLM决策
    fallback_to_score: true     # LLM失败时降级到规则打分
  
  # 历史播客检索配置
  history:
    dir: "out/history_podcasts"
    top_k: 3

database:
  path: "./data/podcast.db"
  backup_enabled: true
  backup_interval_hours: 24

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/podcast.log"
  max_size_mb: 100
  backup_count: 5
