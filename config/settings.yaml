channel:
  id: life-consumer
  name: "生活与消费资讯"
  language: "zh-CN"
  style:
    tone: "口语化、生动、像朋友聊天"
    audience: "普通消费者"
    length_minutes: 6

selection:
  max_clusters: 5
  constraints:
    cooldown_days: 2

source_guard:
  config_dir: "./config/sources"
  min_content_length: 120

compliance:
  policy_level: "standard"
  min_score: 0.6
  rules:
    - sensitive_words
    - illegal_content
    - copyright
    - pii
    - external_links
  rule_overrides:
    pii:
      enabled: true
      params:
        scope: "full"
        max_hits_per_type: 8
        severity: "medium"
    external_links:
      enabled: true
      params:
        max_urls: 8

sources:
  rss:
    - name: "示例RSS"
      url: "https://www.zhihu.com/rss"
      enabled: false

    - name: "60s-每天60秒读懂世界(RSS)"
      enabled: true
      category: "others"
      urls:
        - "https://60s.viki.moe/v2/60s/rss"
        - "https://60api.09cdn.xyz/v2/60s/rss"
        - "https://60s.zeabur.app/v2/60s/rss"
        - "https://60s.crystelf.top/v2/60s/rss"
        - "https://cqxx.site/v2/60s/rss"
        - "https://api.yanyua.icu/v2/60s/rss"
        - "https://60s.tmini.net/v2/60s/rss"
        - "https://60s.7se.cn/v2/60s/rss"
        - "https://60s.mizhoubaobei.top/v2/60s/rss"

  aibot_daily:
    - name: "AI工具集-每日AI快讯"
      enabled: true
      category: "others"
      urls:
        - "https://ai-bot.cn/daily-ai-news/"

  sixtys:
    - name: "60s-每天60秒读懂世界"
      base_url: "https://60s.viki.moe"
      base_urls:
        - "60api.09cdn.xyz"
        - "60s.zeabur.app"
        - "60s.crystelf.top"
        - "cqxx.site"
        - "api.yanyua.icu"
        - "60s.tmini.net"
        - "60s.7se.cn"
        - "60s.mizhoubaobei.top"
      enabled: false
      category: "others"

  lily_rss:
    - group: "health"
      enabled: false
      items:
        - name: "丁香医生-知乎专栏"
          kind: "zhihuzhuanlan"
          value: "https://zhuanlan.zhihu.com/dingxiangyisheng"

    - group: "others"
      enabled: false
      items:
        - name: "LilyRSS-知乎动态-简单心理"
          kind: "zhihu"
          value: "https://www.zhihu.com/org/jian-dan-xin-li"
          enabled: true

        - name: "LilyRSS-知乎话题"
          kind: "zhihu_topic"
          value: "https://www.zhihu.com/topic/19551894"
          query:
            sort: hot

        - name: "LilyRSS-V2EX-评论"
          kind: "v2ex"
          value: "https://www.v2ex.com/t/123456"
          enabled: false

pipeline:
  max_items: 8
  pick_items: 5
  dedup_enabled: true
  filter_enabled: true

filter:
  fields:
    - "title"
    - "content"
    - "url"
  keep_raw: false

llm:
  provider: "deepseek"
  model: "deepseek-chat"
  timeout_seconds: 120
  max_tokens: 4000
  temperature: 0.7

tts:
  provider: "doubao"
  mode: "default"
  voice: "zh_female_tianqing_moon_bigtts"
  speed: 1.0
  volume: 1.0
  pitch: 1.0
  timeout_seconds: 60

output:
  runs_dir: "./out/runs"
  fetch_archives_dir: "./out/fetch"
  script_dir: "./out/script"
  tts_dir: "./out/tts"
  render_dir: "./out/render"
  publish_dir: "./out/publish"

database:
  path: "./data/podcast.db"
  backup_enabled: true
  backup_interval_hours: 24

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/podcast.log"
  max_size_mb: 100
  backup_count: 5
