# ============================================================
# Pipeline 配置
# ============================================================
pipeline:
  max_items: 8
  pick_items: 5
  dedup_enabled: true
  filter_enabled: true

# 汇总型RSS拆分配置
digest_split:
  enabled: true
  cache_ttl_seconds: 86400
  enable_cache: true

filter:
  fields:
    - "title"
    - "content"
    - "url"
  keep_raw: false

# ============================================================
# LLM 配置
# ============================================================
llm:
  provider: "deepseek"  # deepseek | moonshot
  timeout_seconds: 120
  max_tokens: 4000
  temperature: 0.7
  
  # DeepSeek 配置
