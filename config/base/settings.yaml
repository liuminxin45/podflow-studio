# ============================================================
# 日志配置
# ============================================================
logging:
  # 是否启用verbose模式（详细日志）
  verbose: true
  # 控制台日志级别：DEBUG, INFO, WARNING, ERROR
  console_level: INFO
  # 文件日志级别
  file_level: DEBUG

# ============================================================
# 频道配置（全局入口）
# 切换频道后，自动选题策略、风格、受众定位等配置会自动响应
# ============================================================
channel:
  # 频道ID（可选值：life-consumer | tech-innovation | balanced-mix）
  # - life-consumer: 生活消费频道，面向普通消费者，关注民生、钱袋子、生活便利
  # - tech-innovation: 技术创新频道，面向开发者/技术决策者，关注技术突破、开源项目
  # - balanced-mix: 平衡频道，兼顾技术创新和民生价值
  id: life-consumer
  
  # 以下字段由channel.id自动决定，无需手动修改
  name: "生活与消费资讯"  # 自动映射
  language: "zh-CN"
  style:
    tone: "口语化、生动、像朋友聊天"  # 自动映射
    audience: "普通消费者"  # 自动映射
    length_minutes: 6

# 频道预设（内部映射表，由代码自动读取）
channel_presets:
  life-consumer:
    name: "生活与消费资讯"
    style:
      tone: "口语化、生动、像朋友聊天"
      audience: "普通消费者"
      length_minutes: 6
    auto_topic_strategy: "consumer_life_v3"  # 自动选题策略
  
  tech-innovation:
    name: "技术创新资讯"
    style:
      tone: "专业、精准、有深度"
      audience: "开发者、技术决策者"
      length_minutes: 8
    auto_topic_strategy: "tech_innovation"
  
  balanced-mix:
    name: "综合资讯"
    style:
      tone: "专业且易懂、平衡"
      audience: "广泛受众"
      length_minutes: 7
    auto_topic_strategy: "balanced"

selection:
  max_clusters: 5
  constraints:
    cooldown_days: 2

source_guard:
  config_dir: "./config/sources"
  min_content_length: 120

compliance:
  policy_level: "standard"
  min_score: 0.6
  rules:
    - sensitive_words
    - copyright
    - pii
    - external_links
  rule_overrides:
    copyright:
      allow_domains:
        - "60s-static.viki.moe"
        - "60s.viki.moe"
        - "github.com"

selection:
  constraints:
    max_per_domain: 3
    max_per_topic: 3
  max_clusters: 5
  clustering:
    simhash_max_distance: 1
    title_min_jaccard: 0.2
    time_window_days: 1

