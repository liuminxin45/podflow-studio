# ============================================================
# 音频生成工作流配置
# ============================================================
audio:
  # 工作流模式：segmented | unified
  # - segmented: 分段模式（5段脚本 → 5个MP3 → 合并）适合调试和段落级缓存
  # - unified: 统一模式（5段脚本 → 合并脚本 → 1个MP3）速度更快，音频更连贯
  workflow: unified
  
  # 分段模式配置
  segmented:
    enable_cache: true          # 是否启用段落缓存
    fail_on_critical: true      # 关键段落(S0,S1)失败时是否停止
    critical_segments: [S0, S1] # 关键段落列表
  
  # 统一模式配置
  unified:
    enable_cache: true          # 是否启用完整脚本缓存
    transition_text: "\n\n"     # 段落间过渡文本
    add_pauses: true            # 是否在段落间添加停顿标记
    pause_duration_ms: 800      # 停顿时长（毫秒）
    merge_strategy: simple      # 合并策略：simple | smart
    use_ssml: false             # 是否使用SSML标记（需TTS支持）
  
  # 通用配置
  assets_dir: ./assets
  output_format: mp3
  sample_rate: 24000
  
  # 混音配置
  mixing:
    target_loudness: -16.0  # LUFS
    bgm_volume_db: -20.0
    ducking_amount_db: -12.0
    ducking_fade_ms: 500
  
  # BGM配置
  bgm:
    intro_duration: 5.0
    outro_duration: 3.0
    mid_enabled: true
  
  # 导出配置
  export:
    format: "mp3"
    bitrate: "192k"

# ============================================================
# 字幕配置
# ============================================================
subtitles:
  enabled: true
  formats:
    - "srt"
    - "vtt"
  max_chars_per_line: 42
  max_lines: 2

# ============================================================
# 输出配置
# ============================================================
output:
  runs_dir: "./out/runs"
  fetch_archives_dir: "./out/fetch"
  script_dir: "./out/script"
  tts_dir: "./out/tts"
  render_dir: "./out/render"
  publish_dir: "./out/publish"
  base_dir: "output"
  episode_format: "{date}_{topic}_{mode}"
  artifacts:
    - "manifest.json"
    - "chapters.json"
    - "timeline.json"
    - "metrics.json"
    - "trace.json"

# ============================================================
# Research 配置
# ============================================================
research:
  provider: "anspire"  # metaso | anspire
  enabled: true
  timeout_seconds: 60
  max_items: 10
  max_retries: 3
  retry_delay: 1.0
  
  # 断言提取
  claims:
    max_claims_per_item: 10
    min_confidence: 0.6
    include_opinions: false
  
  # 预算控制
  budget:
    max_news_items: 10
    max_claims_per_item: 5
    max_total_claims: 30
    priority_claim_types:
      - "factual"
      - "causal"
      - "predictive"
  
  # 查询构建
  query:
    include_contrast: true
    max_age_days: 30
  
  # Metaso 配置
  metaso:
    api_key: "mk-ED73D964A6996ADE50A1ACDD47356BA8"  # 请替换为您的API Key
    model: "fast"
    max_items: 10
  
  # Anspire 配置
  anspire:
    api_key: "sk-ue3OHcH7XllzCRHpo87k9n5QhGh7H0RB"  # 请替换为您的API Key
    top_k: 5
    is_stream: false
    timeout_seconds: 60
    max_items: 1
    max_retries: 3
    retry_delay: 1.0

# ============================================================
# Editorial 阶段配置
# ============================================================
editorial:
  # 5W框架
  sections:
    - "what"
    - "so_what"
    - "impact"
    - "uncertainty"
    - "takeaway"
  
  # 证据要求
  evidence:
    min_quality: "moderate"
    require_disclaimer: true

# Pipeline 配置（二次检索+二阶段LLM）
pipeline_v2:
  retrieval:
    max_concurrent: 2
    timeout_seconds: 60
    cache_ttl_seconds: 86400  # 24小时
    cache_dir: ".cache/research"
    history_podcast_dir: "out/history_podcasts"
    top_k_history: 5
  llm_stage1:
    timeout_seconds: 60
    max_tokens: 3000
  llm_stage2:
    timeout_seconds: 60
    max_tokens: 2500
  fallback:
    use_draft_on_failure: true  # LLM#2失败时使用draft

# ============================================================
# 自动选题配置（主题候选挖掘 + 听众兴趣评分 + 选题决策）
# 注意：策略由 channel.id 自动决定，无需手动配置
# ============================================================
auto_topic:
  enabled: true  # 开关：true启用自动选题，false使用传统流程
  time_window_days: 7  # 主题聚合时间窗口（天）
  
  # 策略由 channel.id 自动决定：
  # - life-consumer -> consumer_life_v3
  # - tech-innovation -> tech_innovation
  # - balanced-mix -> balanced
  # 如需手动覆盖，可取消注释下面一行：
  # strategy: "consumer_life_v3"
  
  # 策略增强开关（v3新增）
  enable_keywords: true         # 启用关键词匹配
  enable_patterns: true         # 启用正则模式匹配（覆盖同义词）
  enable_compounds: true        # 启用联合规则（抑制泛词误报）
  enable_domains: true          # 启用语义域加分（核心修复）
  
  # 打分配置 - 统一0-100分数体系（可选，覆盖策略默认值）
  scoring:
    # 内容价值分 (0-60)
    archetype_mean_max: 40.0        # 母型平均分最大值
    personal_impact_max: 10.0       # 个人影响分最大值
    counter_intuitive_max: 10.0     # 反直觉分最大值
    
    # 代理信号分 (0-25)
    trend_max: 10.0                 # 趋势信号最大值
    time_max: 5.0                   # 时间信号最大值
    persona_max: 5.0                # 人群相关性最大值
    history_echo_max: 5.0           # 历史呼应最大值
    
    # 结构加成 (-10 ~ +15)
    continuity_max: 6.0             # 连续性加成最大值
    data_enrichable_max: 6.0        # 数据可补充加成最大值
    follow_up_max: 3.0              # 可跟进加成最大值
    
    # 阈值配置 (0-100)
    threshold_must_publish: 70.0    # 必播阈值（>=70分）
    threshold_maybe_publish: 55.0   # 可能播阈值（55-70分）
  
  # LLM Gate配置
  gate:
    top_n: 10                   # 对TopN候选做LLM决策
    fallback_to_score: true     # LLM失败时降级到规则打分
  
  # 历史播客检索配置
  history:
    dir: "out/history_podcasts"
    top_k: 3

# ============================================================
# 人工反馈系统配置
# ============================================================
human_feedback:
  enabled: false                     # 是否启用人工反馈（默认：true）
  storage_dir: "feedback_history"   # 反馈数据存储目录
  auto_continue: true                # 反馈完成后自动继续后续流程（默认：true）
  timeout_seconds: 0               # 等待人工反馈的超时时间（秒，0表示无限等待）
  min_feedback_threshold: 0          # 最少需要反馈的主题数（设为 0 表示可跳过）
  review_mode: "all"                 # 审核模式："all" 审核所有主题，"passed_only" 仅审核通过的主题

# ============================================================
# 脚本生成配置
# ============================================================
script:
  # 质量门控
  quality_gate:
    enabled: true
    pass_threshold: 0.7
    drop_threshold: 0.4
    max_revisions: 3
  
  # 章节配置
  chapters:
    include_intro: true
    include_outro: true
    intro_duration: 10.0
    outro_duration: 5.0
  
  # 新闻合并配置
  news_merger:
    enabled: true                       # 是否启用新闻合并
    method: "llm"                       # 合并方法："llm" 或 "rules"
    
    # LLM 合并配置（method: "llm"）
    merge_threshold: 0.7                # 合并置信度阈值（0-1）
    max_merge_count: 5                  # 单组最多合并新闻数
    
    # 规则合并配置（method: "rules"，备用方案）
    entity_similarity_threshold: 0.5    # 实体重叠度阈值（0-1）
    title_similarity_threshold: 0.3     # 标题相似度阈值（0-1）
    min_shared_keywords: 2              # 最少共享关键词数

# ============================================================
# 缓存配置
# ============================================================
cache:
  base_dir: ".cache"
  ttl_hours: 168  # 7天
  max_size_mb: 1000

# ============================================================
# 成本控制
# ============================================================
cost_control:
  max_cost_per_episode: 1.0  # USD
  alert_threshold: 0.8
  
  # API成本模型
  api_costs:
    metaso:
      per_request: 0.01
    llm:
      per_1k_tokens: 0.002
    tts:
      per_second: 0.0001

# ============================================================
# 系统配置
# ============================================================
system:
  http_timeout_seconds: 180
  database_path: "./out/podcast.sqlite"

database:
  path: "./data/podcast.db"
  backup_enabled: true
  backup_interval_hours: 24
