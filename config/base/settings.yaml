    base_url: "https://api.moonshot.cn/v1"
    api_key: "sk-7I3yv5XBtRUG9R9KoYordU1mDfVJBD0HZ5LmE6T0ev1hGqsR"  # 请替换为您的API Key
    model: "kimi-k2-0905-preview"

# ============================================================
