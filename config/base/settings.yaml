# ============================================================
# 系统配置
# ============================================================
version: "2.0.0"

# 通用设置
general:
  cache_enabled: true
  metrics_enabled: true
  trace_enabled: true
  log_level: "INFO"

# ============================================================
# 日志配置
# ============================================================
logging:
  # 是否启用verbose模式（详细日志）
  verbose: true
  # 控制台日志级别：DEBUG, INFO, WARNING, ERROR
  console_level: INFO
  # 文件日志级别
  file_level: DEBUG
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/podcast.log"
  max_size_mb: 100
  backup_count: 5

# ============================================================
# 频道配置（全局入口）
# 切换频道后，自动选题策略、风格、受众定位等配置会自动响应
# ============================================================
channel:
  # 频道ID（可选值：life-consumer | tech-innovation | balanced-mix）
  # - life-consumer: 生活消费频道，面向普通消费者，关注民生、钱袋子、生活便利
  # - tech-innovation: 技术创新频道，面向开发者/技术决策者，关注技术突破、开源项目
  # - balanced-mix: 平衡频道，兼顾技术创新和民生价值
  id: life-consumer
  
  # 以下字段由channel.id自动决定，无需手动修改
  name: "生活与消费资讯"  # 自动映射
  language: "zh-CN"
  style:
    tone: "口语化、生动、像朋友聊天"  # 自动映射
    audience: "普通消费者"  # 自动映射
    length_minutes: 6

# 频道预设（内部映射表，由代码自动读取）
channel_presets:
  life-consumer:
    name: "生活与消费资讯"
    style:
      tone: "口语化、生动、像朋友聊天"
      audience: "普通消费者"
      length_minutes: 6
    auto_topic_strategy: "consumer_life_v3"  # 自动选题策略
  
  tech-innovation:
    name: "技术创新资讯"
    style:
      tone: "专业、精准、有深度"
      audience: "开发者、技术决策者"
      length_minutes: 8
    auto_topic_strategy: "tech_innovation"
  
  balanced-mix:
    name: "综合资讯"
    style:
      tone: "专业且易懂、平衡"
      audience: "广泛受众"
      length_minutes: 7
    auto_topic_strategy: "balanced"

# ============================================================
# Fetch 阶段配置
# ============================================================
fetch:
  timeout_seconds: 300
  max_items: 50
  
  # 去重配置
  dedup:
    enabled: true
    methods:
      - "url_normalize"
      - "content_sha256"
      - "simhash"
  
  # 日期过滤配置
  date_filter:
    enabled: true
    mode: "exact"  # "exact" | "range" | "disabled"
    days_before: 0
    days_after: 0
  
  # RSS源配置
  rss:
    timeout_seconds: 30
    max_retries: 3
  
  # MetaSo配置
  metaso:
    enabled: false
    max_items: 10
    timeout_seconds: 60

# ============================================================
# Store 阶段配置（去重、聚类、选择）
# ============================================================
store:
  # 聚类配置
  clustering:
    simhash_max_distance: 4
    title_min_jaccard: 0.4
    time_window_days: 7
    cooldown_days: 2
    min_cluster_size: 1
  
  # 评分权重
  scoring:
    freshness_weight: 0.3
    impact_weight: 0.25
    source_trust_weight: 0.25
    quality_weight: 0.2
  
  # 约束条件
  constraints:
    cooldown_hours: 48
    max_per_topic: 4
    max_per_domain: 3
    title_similarity_threshold: 0.7
    exception_keywords:
      - "重大突破"
      - "首次"
      - "历史性"

# ============================================================
# Selection 配置
# ============================================================
selection:
  max_clusters: 5
  constraints:
    cooldown_days: 2
    max_per_domain: 3
    max_per_topic: 3
  clustering:
    simhash_max_distance: 1
    title_min_jaccard: 0.2
    time_window_days: 1

source_guard:
  config_dir: "./config/sources"
  min_content_length: 120

compliance:
  policy_level: "standard"
  min_score: 0.6
  rules:
    - sensitive_words
    - copyright
    - pii
    - external_links
  rule_overrides:
    copyright:
