pipeline:
  max_items: 8
  pick_items: 5
  dedup_enabled: true
  filter_enabled: true
digest_split:
  enabled: true
  cache_ttl_seconds: 86400
  enable_cache: true
filter:
  fields:
  - title
  - content
  - url
  keep_raw: false
llm:
  provider: deepseek
  model: deepseek-chat
  timeout_seconds: 120
  max_tokens: 4000
  temperature: 0.7
tts:
  provider: doubao
  mode: default
  voice: zh_female_tianqing_moon_bigtts
  speed: 1.0
  volume: 1.0
  pitch: 1.0
  timeout_seconds: 60
output:
  runs_dir: ./out/runs
  fetch_archives_dir: ./out/fetch
  script_dir: ./out/script
  tts_dir: ./out/tts
  render_dir: ./out/render
  publish_dir: ./out/publish
research:
  provider: anspire
  enabled: true
  timeout_seconds: 60
  max_items: 10
  max_retries: 3
  retry_delay: 1.0
  metaso:
    model: fast
  anspire:
    top_k: 5
    is_stream: false
pipeline_v2:
  retrieval:
    max_concurrent: 2
    timeout_seconds: 60
    cache_ttl_seconds: 86400
    cache_dir: .cache/research
    history_podcast_dir: out/history_podcasts
    top_k_history: 5
  llm_stage1:
    timeout_seconds: 60
    max_tokens: 3000
  llm_stage2:
    timeout_seconds: 60
    max_tokens: 2500
  fallback:
    use_draft_on_failure: true
auto_topic:
  enabled: true
  time_window_days: 7
  enable_keywords: true
  enable_patterns: true
  enable_compounds: true
  enable_domains: true
  scoring:
    archetype_mean_max: 37.0
    personal_impact_max: 8.5
    counter_intuitive_max: 10.0
    trend_max: 10.0
    time_max: 4.2
    persona_max: 5.0
    history_echo_max: 5.0
    continuity_max: 5.1
    data_enrichable_max: 5.1
    follow_up_max: 3.0
    threshold_must_publish: 70.0
    threshold_maybe_publish: 55.0
  gate:
    top_n: 10
    fallback_to_score: true
  history:
    dir: out/history_podcasts
    top_k: 3
human_feedback:
  enabled: false
  storage_dir: feedback_history
  auto_continue: true
  timeout_seconds: 300
  min_feedback_threshold: 0
database:
  path: ./data/podcast.db
  backup_enabled: true
  backup_interval_hours: 24
