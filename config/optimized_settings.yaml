    urls:
    - https://www.ithome.com/rss/
  - name: 理想生活实验室
    fetcher: standard_rss
    enabled: false
    category: lifestyle
    urls:
    - https://www.toodaylab.com/feed
  - name: 新华社新闻
    fetcher: standard_rss
