auto_topic:
  enable_compounds: true
  enable_domains: true
  enable_keywords: true
  enable_patterns: true
  enabled: true
  gate:
    fallback_to_score: true
    top_n: 10
  history:
    dir: out/history_podcasts
    top_k: 3
  scoring:
    archetype_mean_max: 37.0
    continuity_max: 5.1
    counter_intuitive_max: 10.0
    data_enrichable_max: 5.1
    follow_up_max: 3.0
    history_echo_max: 5.0
    persona_max: 5.0
    personal_impact_max: 8.5
    threshold_maybe_publish: 55.0
    threshold_must_publish: 70.0
    time_max: 4.2
    trend_max: 10.0
  time_window_days: 7
channel:
  id: life-consumer
  language: zh-CN
  name: 生活与消费资讯
  style:
    audience: 普通消费者
    length_minutes: 6
    tone: 口语化、生动、像朋友聊天
channel_presets:
  balanced-mix:
    auto_topic_strategy: balanced
    name: 综合资讯
    style:
      audience: 广泛受众
      length_minutes: 7
      tone: 专业且易懂、平衡
  life-consumer:
    auto_topic_strategy: consumer_life_v3
    name: 生活与消费资讯
    style:
      audience: 普通消费者
      length_minutes: 6
      tone: 口语化、生动、像朋友聊天
  tech-innovation:
    auto_topic_strategy: tech_innovation
    name: 技术创新资讯
    style:
      audience: 开发者、技术决策者
      length_minutes: 8
      tone: 专业、精准、有深度
compliance:
  min_score: 0.6
  policy_level: standard
  rule_overrides:
    copyright:
      allow_domains:
      - 60s-static.viki.moe
      - 60s.viki.moe
      - github.com
  rules:
  - sensitive_words
  - copyright
  - pii
  - external_links
database:
  backup_enabled: true
  backup_interval_hours: 24
  path: ./data/podcast.db
digest_split:
  cache_ttl_seconds: 86400
  enable_cache: true
  enabled: true
filter:
  fields:
  - title
  - content
  - url
  keep_raw: false
human_feedback:
  auto_continue: true
  enabled: false
  min_feedback_threshold: 0
  storage_dir: feedback_history
  timeout_seconds: 300
llm:
  api_key: <api-key>
  base_url: https://api.bltcy.ai/v1/chat/completions
  max_tokens: 4000
  model: gpt-5.2
  provider: bltcy
  temperature: 0.7
  timeout_seconds: 120
