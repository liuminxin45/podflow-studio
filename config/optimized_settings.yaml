logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: ./logs/podcast.log
  max_size_mb: 100
  backup_count: 5
channel:
  id: life-consumer
  name: 生活与消费资讯
  language: zh-CN
  style:
    tone: 口语化、生动、像朋友聊天
    audience: 普通消费者
    length_minutes: 6
channel_presets:
  life-consumer:
    name: 生活与消费资讯
    style:
      tone: 口语化、生动、像朋友聊天
      audience: 普通消费者
      length_minutes: 6
    auto_topic_strategy: consumer_life_v3
  tech-innovation:
    name: 技术创新资讯
    style:
      tone: 专业、精准、有深度
      audience: 开发者、技术决策者
      length_minutes: 8
    auto_topic_strategy: tech_innovation
  balanced-mix:
    name: 综合资讯
    style:
      tone: 专业且易懂、平衡
      audience: 广泛受众
      length_minutes: 7
    auto_topic_strategy: balanced
selection:
  constraints:
    max_per_domain: 3
    max_per_topic: 3
  max_clusters: 5
  clustering:
    simhash_max_distance: 1
    title_min_jaccard: 0.2
    time_window_days: 1
source_guard:
  config_dir: ./config/sources
  min_content_length: 120
compliance:
  policy_level: standard
  min_score: 0.6
  rules:
  - sensitive_words
  - copyright
  - pii
  - external_links
  rule_overrides:
    copyright:
      allow_domains:
      - 60s-static.viki.moe
      - 60s.viki.moe
      - github.com
sources:
  rss:
  - name: 60s-每天60秒读懂世界
    fetcher: sixtys_digest
    enabled: true
    category: others
    urls:
    - https://60s.viki.moe/v2/60s/rss
    - https://60api.09cdn.xyz/v2/60s/rss
    - https://60s.zeabur.app/v2/60s/rss
    - https://60s.crystelf.top/v2/60s/rss
    - https://cqxx.site/v2/60s/rss
    - https://api.yanyua.icu/v2/60s/rss
    - https://60s.tmini.net/v2/60s/rss
    - https://60s.7se.cn/v2/60s/rss
    - https://60s.mizhoubaobei.top/v2/60s/rss
  - name: AI日报快讯
    fetcher: ai_daily_news
    enabled: false
    category: ai_tech
    urls:
    - https://60s.viki.moe
  - name: 虎嗅网
    fetcher: standard_rss
    enabled: false
    category: tech_business
    urls:
    - https://www.huxiu.com/rss/0.xml
  - name: 36氪
