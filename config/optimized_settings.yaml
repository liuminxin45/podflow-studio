  - name: 财富中文网商业
    fetcher: standard_rss
    enabled: false
    category: business
    urls:
    - https://plink.anyfeeder.com/fortunechina/shangye
  - name: 华尔街日报
    fetcher: standard_rss
    enabled: false
    category: business
    urls:
    - https://plink.anyfeeder.com/wsj/cn
  - name: 财富中文网
    fetcher: standard_rss
    enabled: false
