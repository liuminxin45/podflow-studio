logging:
  backup_count: 5
  file: ./logs/podcast.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
  max_size_mb: 100
output:
  fetch_archives_dir: ./out/fetch
  publish_dir: ./out/publish
  render_dir: ./out/render
  runs_dir: ./out/runs
  script_dir: ./out/script
  tts_dir: ./out/tts
pipeline:
  dedup_enabled: true
  filter_enabled: true
  max_items: 8
  pick_items: 5
pipeline_v2:
  fallback:
    use_draft_on_failure: true
  llm_stage1:
    max_tokens: 3000
    timeout_seconds: 60
  llm_stage2:
    max_tokens: 2500
    timeout_seconds: 60
  retrieval:
    cache_dir: .cache/research
    cache_ttl_seconds: 86400
    history_podcast_dir: out/history_podcasts
    max_concurrent: 2
    timeout_seconds: 60
    top_k_history: 5
research:
  anspire:
    is_stream: false
    top_k: 5
  enabled: true
  max_items: 10
  max_retries: 3
  max_sources: 3
  metaso:
    model: fast
  provider: bocha
  retry_delay: 1.0
  search_engine: google
  timeout_seconds: 60
selection:
  clustering:
    simhash_max_distance: 1
    time_window_days: 1
    title_min_jaccard: 0.2
  constraints:
    max_per_domain: 3
    max_per_topic: 3
  max_clusters: 5
source_guard:
  config_dir: ./config/sources
  min_content_length: 120
