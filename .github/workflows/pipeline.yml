name: Podcast Pipeline

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Episode date (YYYY-MM-DD). Leave empty for today."
        required: false
        default: ""
      max_items:
        description: "Override pipeline.max_items"
        required: false
        default: ""
      metaso_max_items:
        description: "Override metaso max items (optional)"
        required: false
        default: ""
      script_input:
        description: "script input: auto/items/research"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - items
          - research
      force_fetch:
        description: "Force re-fetch"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      timeout_seconds:
        description: "HTTP/TTS/ffmpeg timeout seconds"
        required: false
        default: "180"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PODCAST_DB_PATH: ./out/podcast.sqlite
      LOG_FORMAT: text

      # LLM
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'moonshot' }}
      MOONSHOT_BASE_URL: ${{ secrets.MOONSHOT_BASE_URL || 'https://api.moonshot.cn/v1' }}
      MOONSHOT_MODEL: ${{ secrets.MOONSHOT_MODEL || 'kimi-k2-0905-preview' }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}

      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || 'deepseek-chat' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      # Metaso (optional)
      METASO_API_KEY: ${{ secrets.METASO_API_KEY }}
      METASO_MODEL: ${{ secrets.METASO_MODEL || 'fast' }}

      # Cross-platform TTS fallback (Linux uses edge-tts)
      EDGE_TTS_VOICE: ${{ secrets.EDGE_TTS_VOICE || 'zh-CN-XiaoxiaoNeural' }}

      # Optional: If you have Doubao configured, you can still set these.
      DOUBAO_APP_ID: ${{ secrets.DOUBAO_APP_ID }}
      DOUBAO_ACCESS_KEY: ${{ secrets.DOUBAO_ACCESS_KEY }}
      DOUBAO_SECRET_KEY: ${{ secrets.DOUBAO_SECRET_KEY }}
      DOUBAO_REGION: ${{ secrets.DOUBAO_REGION || 'cn-north-1' }}
      DOUBAO_TTS_VOICE: ${{ secrets.DOUBAO_TTS_VOICE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        shell: bash
        run: |
          set -euo pipefail
          cmd=(python run.py --step all --script-input "${{ inputs.script_input }}" --timeout-seconds "${{ inputs.timeout_seconds }}")

          if [[ -n "${{ inputs.date }}" ]]; then
            cmd+=(--date "${{ inputs.date }}")
          fi

          if [[ -n "${{ inputs.max_items }}" ]]; then
            cmd+=(--max-items "${{ inputs.max_items }}")
          fi

          if [[ -n "${{ inputs.metaso_max_items }}" ]]; then
            cmd+=(--metaso-max-items "${{ inputs.metaso_max_items }}")
          fi

          if [[ "${{ inputs.force_fetch }}" == "true" ]]; then
            cmd+=(--force-fetch)
          fi

          echo "Running: ${cmd[*]}"
          "${cmd[@]}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-out-${{ inputs.date || github.run_id }}
          if-no-files-found: warn
          path: |
            out/episodes
            out/logs
            out/fetch_archives
            out/podcast.sqlite
