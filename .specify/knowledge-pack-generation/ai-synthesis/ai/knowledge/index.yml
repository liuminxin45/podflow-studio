schema_version: "1.1"
purpose: "Generated Auto-Podcast Studio knowledge index for Spec Kit agents."
policy:
  default_context: false
  no_full_text_search_required: true
  repository_map_authority: ".specify/memory/repository-map.md"
  selection_rule: "Match affected repository, layer tags, risk flags, stage, and explicit task terms; read only the smallest useful guide set."
  max_selected_guides: 3
  default_authority: "generated"
  authority_levels: [generated, reviewed, authoritative]

workspace:
